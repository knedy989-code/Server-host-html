<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LocalHost">
    <title>iPad Native Safari Host</title>
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Offline%20Server%22,%22short_name%22:%22LocalHost%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f172a%22,%22theme_color%22:%22%230f172a%22}">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 700px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin: 0 0 25px 0;
            text-align: center;
        }

        .tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--card-bg);
            color: var(--accent);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .panel { display: none; }
        .panel.active { display: block; }

        .drop-zone {
            border: 2px dashed #475569;
            border-radius: 14px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(30, 41, 59, 0.3);
            transition: all 0.25s ease;
        }

        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.08);
        }

        #file-input { display: none; }

        .editor-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
            font-size: 0.9rem;
            box-sizing: border-box;
            resize: none;
            outline: none;
        }

        .launch-btn {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .status-container {
            margin-top: 25px;
            display: none;
            text-align: center;
        }

        .action-button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            align-items: center;
        }

        .open-safari-btn {
            display: inline-block;
            width: 85%;
            color: #0f172a;
            background: #4ade80;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 14px 0;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(74, 222, 128, 0.3);
        }

        .download-ipa-btn {
            display: inline-block;
            width: 85%;
            color: #ffffff;
            background: #818cf8;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 14px 0;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(129, 140, 248, 0.3);
        }

        .pwa-install-banner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 450px;
            background: #1e293b;
            border: 1.5px solid var(--accent);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 9999;
            box-sizing: border-box;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { bottom: -100px; opacity: 0; }
            to { bottom: 20px; opacity: 1; }
        }

        .pwa-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pwa-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text);
        }

        .pwa-icon-svg {
            width: 24px;
            height: 24px;
            fill: var(--accent);
            vertical-align: middle;
            background: rgba(56, 189, 248, 0.1);
            padding: 6px;
            border-radius: 6px;
        }

        .pwa-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>LocalHost Dashboard</h1>
        <p class="subtitle">Launches environments into Safari or compiles assets for Ksign signing</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload-panel', this)">File Drop</button>
            <button class="tab-btn" onclick="switchTab('code-panel', this)">Code Editor</button>
        </div>

        <div id="upload-panel" class="panel active">
            <div class="drop-zone" id="drop-zone">
                <div style="color: var(--text-dim);">Tap to <span>Browse Files</span> or Drop HTML File</div>
                <input type="file" id="file-input" accept=".html">
            </div>
        </div>

        <div id="code-panel" class="panel">
            <div class="editor-container">
                <textarea id="code-editor" placeholder="&#10;<!DOCTYPE html>&#10;<html>&#10;<body>&#10;  <h1>Hello World</h1>&#10;</body>&#10;</html>"></textarea>
                <button class="launch-btn" onclick="launchFromEditor()">🚀 Deploy To Local Host</button>
            </div>
        </div>

        <div class="status-container" id="status-container">
            <div style="color: var(--text-dim); font-size: 0.95rem; margin-bottom: 5px;">
                Virtual Server: <code id="domain-display" style="color: var(--accent);">domain.app</code>
            </div>
            <div class="action-button-group">
                <button id="safari-breaker" class="open-safari-btn">🌐 Open Live in Safari</button>
                <button id="ipa-compiler" class="download-ipa-btn">📦 Prepare Web-Bundle Asset</button>
            </div>
        </div>
    </div>
</div>

<div id="pwa-banner" class="pwa-install-banner">
    <div class="pwa-content">
        <div class="pwa-text">
            Install <b>LocalHost</b> to your home screen: Tap the Share icon 
            <svg class="pwa-icon-svg" viewBox="0 0 24 24"><path d="M16 5l-4-4-4 4h3v9h2V5h3zm4 5v11H4V10h4v2H6v7h12v-7h-2v-2h4z"/></svg> 
            above and select <b>Add to Home Screen</b>.
        </div>
        <button class="pwa-close" onclick="closePwaBanner()">✕</button>
    </div>
</div>

<script>
    const swCode = `
        const virtualServers = {};
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
        self.addEventListener('message', e => {
            if (e.data && e.data.type === 'HOST_FILE') { virtualServers[e.data.id] = e.data.content; }
        });
        self.addEventListener('fetch', e => {
            const url = e.request.url;
            if (url.includes('/virtual-host/') && url.endsWith('.app')) {
                const segments = url.split('/');
                const fileId = segments[segments.length - 1].replace('.app', '');
                const hostedContent = virtualServers[fileId];
                if (hostedContent) {
                    e.respondWith(new Response(hostedContent, { headers: { 'Content-Type': 'text/html' } }));
                    return;
                }
            }
            e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
        });
    `;

    let swActive = false;
    if ('serviceWorker' in navigator) {
        const blob = new Blob([swCode], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: './' })
            .then(() => { if (navigator.serviceWorker.controller) swActive = true; })
            .catch(() => {});
    }

    document.addEventListener("DOMContentLoaded", () => {
        const isMaciPad = /Macintosh/i.test(navigator.userAgent) && navigator.maxTouchPoints > 1;
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

        if ((isMaciPad || isIOS) && !isStandalone) {
            document.getElementById('pwa-banner').style.display = 'block';
        }
    });

    function closePwaBanner() {
        document.getElementById('pwa-banner').style.display = 'none';
    }

    function switchTab(panelId, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        btn.classList.add('active');
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const statusContainer = document.getElementById('status-container');
    const safariBreaker = document.getElementById('safari-breaker');
    const ipaCompiler = document.getElementById('ipa-compiler');
    const domainDisplay = document.getElementById('domain-display');
    const codeEditor = document.getElementById('code-editor');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFileUpload(e.target.files[0]);
    });

    window.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    window.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    window.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) handleFileUpload(e.dataTransfer.files[0]);
    });

    function prepareWebAsset(htmlCode, filename) {
        // Packages the code into a clean, standalone file template for shell assembly
        const blob = new Blob([htmlCode], { type: 'text/html' });
        const downloadUrl = URL.createObjectURL(blob);
        const tracker = document.createElement('a');
        tracker.href = downloadUrl;
        tracker.download = `index.html`;
        document.body.appendChild(tracker);
        tracker.click();
        document.body.removeChild(tracker);
        alert("Asset ready! Compress this index.html into a .zip file to pass into your cloud compiler for Ksign signing.");
    }

    function deployToVirtualServer(htmlContent) {
        const serverId = 'app-' + Math.random().toString(36).substring(2, 7);
        let dynamicUrl = '';

        if (swActive && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({ type: 'HOST_FILE', id: serverId, content: htmlContent });
            const basePath = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
            dynamicUrl = basePath + `virtual-host/${serverId}.app`;
            domainDisplay.innerText = `${serverId}.app`;
        } else {
            const blob = new Blob([htmlContent], { type: 'text/html' });
            dynamicUrl = URL.createObjectURL(blob);
            domainDisplay.innerText = `${serverId}.local.app`;
        }

        safariBreaker.onclick = function() { window.open(dynamicUrl, '_blank'); };
        ipaCompiler.onclick = function() { prepareWebAsset(htmlContent, serverId); };
        statusContainer.style.display = 'block';
    }

    function handleFileUpload(file) {
        const reader = new FileReader();
        reader.onload = (e) => deployToVirtualServer(e.target.result);
        reader.readAsText(file);
    }

    function launchFromEditor() {
        const codeValue = codeEditor.value.trim();
        if (!codeValue) return alert("Type or paste some HTML code first!");
        deployToVirtualServer(codeValue);
    }
</script>

</body>
</html>
